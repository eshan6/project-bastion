<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>Bastion FSP — Forward Stockout Predictor</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; }
  html, body, #root { height: 100%; width: 100%; margin: 0; padding: 0; }
  body {
    font-family: Inter, ui-sans-serif, system-ui, -apple-system, sans-serif;
    font-size: 13px; color: #0f172a; background: #f8fafc;
    -webkit-font-smoothing: antialiased; -moz-osx-font-smoothing: grayscale;
    font-feature-settings: "cv11", "ss01";
  }
  button { font: inherit; color: inherit; background: none; border: none; padding: 0; cursor: pointer; }
  .mono, .muted-mono { font-family: "JetBrains Mono", ui-monospace, Menlo, monospace; font-size: 11.5px; }
  .muted-mono { color: #94a3b8; }
  .subtle { color: #64748b; }
  .lbl { font-weight: 600; color: #0f172a; }
  .upper-xs { text-transform: uppercase; letter-spacing: 0.04em; font-size: 10px; color: #94a3b8; }
  .dot-sep { color: #cbd5e1; margin: 0 4px; }

  /* shell */
  .shell { display: grid; grid-template-rows: 44px 1fr 88px; height: 100%; background: #f8fafc; }
  .body  { display: grid; grid-template-columns: 260px 1fr 360px; min-height: 0; gap: 0; }
  .loading { grid-row: 2 / 4; display: flex; align-items: center; justify-content: center; color: #64748b; }

  /* topbar */
  .topbar {
    display: flex; align-items: center; justify-content: space-between;
    background: #fff; border-bottom: 1px solid #e2e8f0; padding: 0 14px; height: 44px;
  }
  .topbar-l { display: flex; align-items: center; gap: 12px; }
  .topbar-r { display: flex; align-items: center; gap: 14px; flex-wrap: nowrap; white-space: nowrap; }
  .logo { width: 26px; height: 26px; border-radius: 5px; background: linear-gradient(160deg,#2563eb,#1d4ed8); color:#fff; display:flex; align-items:center; justify-content:center; font-weight:700; font-size:13px; box-shadow: 0 1px 2px rgba(15,23,42,.18); }
  .brand-block { line-height: 1.1; }
  .brand { font-size: 13.5px; font-weight: 700; letter-spacing: -0.01em; }
  .brand-mod { color: #2563eb; font-weight: 700; }
  .brand-sub { font-size: 10.5px; color: #94a3b8; margin-top: 1px; }
  .divider-v { width: 1px; height: 22px; background: #e2e8f0; }
  .scn-select {
    border: 1px solid #e2e8f0; background: #f8fafc; padding: 4px 8px; border-radius: 5px;
    font: inherit; color: #0f172a; cursor: pointer; min-width: 220px;
  }
  .kpi { display: flex; flex-direction: column; align-items: flex-start; gap: 0; font-size: 12px; line-height: 1.15; }
  .kpi-l { color: #94a3b8; text-transform: uppercase; letter-spacing: 0.04em; font-size: 9.5px; }
  .kpi-v { color: #0f172a; font-weight: 600; font-family: "JetBrains Mono", monospace; font-size: 11.5px; white-space: nowrap; }
  .badge.demo { background: #0f172a; color:#fff; padding: 2px 8px; border-radius: 4px; font-size: 10px; letter-spacing: 0.06em; font-weight: 600; }

  /* status pill */
  .status-pill { display:inline-flex; align-items:center; gap:6px; border-radius:9999px; padding: 2px 8px; font-weight: 500; font-size: 11.5px; }
  .status-pill[data-size="sm"] { padding: 1px 7px; font-size: 11px; gap: 5px; }
  .status-dot { width: 6px; height: 6px; border-radius: 9999px; }

  /* rails */
  .rail { display: flex; flex-direction: column; background: #fff; min-height: 0; }
  .rail-l { border-right: 1px solid #e2e8f0; }
  .rail-r { border-left:  1px solid #e2e8f0; }
  .rail-head { display:flex; align-items: baseline; justify-content: space-between; padding: 10px 12px; border-bottom: 1px solid #e2e8f0; flex-shrink: 0; }
  .rail-title { font-weight: 700; }
  .rail-sub { font-size: 10.5px; color: #94a3b8; }
  .rail-scroll { flex: 1; overflow-y: auto; padding: 6px 6px 12px; }
  .rail-scroll--r { padding: 0 2px 0 0; }
  .rail-section-l { padding: 8px 8px 4px; font-size: 10px; font-weight: 600; color: #94a3b8; text-transform: uppercase; letter-spacing: 0.06em; }

  /* post row */
  .post-row { display:flex; align-items:center; justify-content:space-between; gap: 8px; width: 100%; padding: 7px 8px; border-radius: 5px; text-align: left; transition: background 80ms; }
  .post-row:hover { background: #f1f5f9; }
  .post-row--selected { background: #eff6ff; box-shadow: inset 2px 0 0 #2563eb; }
  .post-row-main { min-width: 0; flex: 1; }
  .post-row-title { font-size: 12.5px; font-weight: 500; color: #0f172a; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .post-row-meta { display:flex; align-items: center; font-size: 10.5px; color: #64748b; margin-top: 1px; }
  .post-row-tail { display:flex; flex-direction: column; align-items: flex-end; gap: 2px; flex-shrink: 0; }
  .dts-mini { font-family: "JetBrains Mono", monospace; font-size: 10.5px; color: #64748b; }

  /* canvas + map */
  .canvas { position: relative; min-width: 0; min-height: 0; background: #f1f5f9; display:flex; flex-direction: column; }
  .map-frame { position: relative; flex: 1; min-height: 0; }
  .map-banner { position: absolute; top: 12px; left: 12px; right: 56px; z-index: 5; display: flex; flex-direction: column; gap: 6px; pointer-events: none; max-width: 560px; }
  .banner-card { display:flex; gap: 8px; align-items: center; padding: 5px 9px; border-radius: 6px; box-shadow: 0 1px 2px rgba(15,23,42,.06), 0 4px 12px -4px rgba(15,23,42,.12); pointer-events: auto; font-size: 11.5px; line-height: 1.35; } font-size: 12px; }
  .banner-info     { background:#fff; border: 1px solid #e2e8f0; }
  .banner-warn     { background:#fefce8; border: 1px solid rgba(202,138,4,.35); }
  .banner-critical { background:#fef2f2; border: 1px solid rgba(220,38,38,.35); }
  .banner-text { color: #475569; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; min-width: 0; flex: 1; }

  .event-tag { display: inline-block; padding: 2px 7px; border-radius: 4px; font-size: 10.5px; font-weight: 600; letter-spacing: 0.02em; flex-shrink: 0; }
  .tag-info     { background: #f1f5f9; color: #475569; }
  .tag-warn     { background: rgba(202,138,4,.14); color: #854d0e; }
  .tag-critical { background: rgba(220,38,38,.12); color: #991b1b; }

  /* map overlays */
  .map-legend {
    position: absolute; bottom: 12px; right: 56px; background: rgba(255,255,255,0.96);
    border: 1px solid #e2e8f0; border-radius: 6px; padding: 8px 10px;
    box-shadow: 0 1px 2px rgba(15,23,42,.06), 0 4px 14px -6px rgba(15,23,42,.14);
    font-size: 11px; min-width: 152px;
    max-height: calc(100% - 24px); overflow: auto;
  }
  .map-legend--closed { padding: 0; min-width: 0; }
  .legend-toggle {
    display: flex; align-items: center; justify-content: space-between;
    width: 100%; padding: 0; background: transparent; border: 0; color: #64748b;
    font-size: 9.5px; font-weight: 700; letter-spacing: 0.06em; text-transform: uppercase;
    margin-bottom: 4px; cursor: pointer;
  }
  .map-legend--closed .legend-toggle { padding: 6px 9px; margin: 0; min-width: 38px; min-height: 28px; }
  .legend-toggle:hover { color: #0f172a; }
  .legend-toggle-chev { font-size: 14px; color: #94a3b8; line-height: 1; }
  .legend-title { font-size: 9.5px; font-weight: 700; letter-spacing: 0.06em; text-transform: uppercase; color: #94a3b8; margin: 2px 0 4px; }
  .legend-row { display:flex; align-items:center; gap: 8px; padding: 1.5px 0; color: #475569; }
  .legend-glyph { display: inline-flex; width: 16px; justify-content: center; }
  .legend-pill { width: 8px; height: 8px; border-radius: 9999px; display: inline-block; }
  .legend-divider { height: 1px; background: #e2e8f0; margin: 5px 0; }

  .map-meta { position: absolute; left: 12px; bottom: 60px; background: rgba(255,255,255,0.92); border: 1px solid #e2e8f0; border-radius: 6px; padding: 6px 9px; font-size: 10.5px; color: #475569; line-height: 1.5; }
  .meta-label { font-size: 9.5px; color: #94a3b8; text-transform: uppercase; letter-spacing: 0.06em; margin-right: 5px; }
  .map-scale { position: absolute; left: 12px; bottom: 12px; }
  .scale-bar { display: flex; height: 5px; width: 120px; border: 1px solid #475569; }
  .scale-bar > div { flex: 1; }
  .scale-bar > div:nth-child(odd)  { background: #475569; }
  .scale-bar > div:nth-child(even) { background: #fff; }
  .scale-label { font-size: 9.5px; color: #475569; margin-top: 2px; font-family: "JetBrains Mono", monospace; }
  .map-north { position: absolute; right: 12px; bottom: 12px; }
  .map-zoom {
    position: absolute; right: 12px; top: 12px;
    display: flex; flex-direction: column; gap: 0;
    background: rgba(255,255,255,0.96); border: 1px solid #e2e8f0; border-radius: 6px;
    box-shadow: 0 1px 2px rgba(15,23,42,.08), 0 4px 12px -6px rgba(15,23,42,.16);
    overflow: hidden; z-index: 6;
  }
  .map-zoom button {
    width: 28px; height: 28px; font-size: 14px; color: #475569;
    border-bottom: 1px solid #e2e8f0;
  }
  .map-zoom button:last-child { border-bottom: 0; }
  .map-zoom button:hover { background: #f1f5f9; color: #0f172a; }

  .map-tooltip {
    position: absolute; pointer-events: none; z-index: 8;
    background: #0f172a; color: #f8fafc;
    border-radius: 6px; padding: 8px 10px; min-width: 180px; max-width: 240px;
    font-size: 11px; line-height: 1.45;
    box-shadow: 0 4px 16px -4px rgba(15,23,42,.4);
    transform: translate(-50%, calc(-100% - 12px));
  }
  .map-tooltip::after {
    content: ""; position: absolute; left: 50%; top: 100%;
    transform: translateX(-50%); width: 0; height: 0;
    border: 5px solid transparent; border-top-color: #0f172a;
  }
  .mt-name { font-weight: 600; font-size: 12px; color: #fff; margin-bottom: 2px; }
  .mt-row { display: flex; justify-content: space-between; gap: 12px; color: #cbd5e1; }
  .mt-row .v { font-family: "JetBrains Mono", monospace; color: #f1f5f9; }
  .mt-divider { height: 1px; background: rgba(248,250,252,0.12); margin: 5px 0; }
  .mt-status { display: inline-flex; align-items: center; gap: 5px; font-weight: 600; }
  .mt-status .d { width: 6px; height: 6px; border-radius: 999px; }
  .mt-hint { font-size: 10px; color: #94a3b8; margin-top: 4px; font-style: italic; }

  /* tabs */
  .tab-row { display: grid; grid-template-columns: repeat(5, 1fr); border-bottom: 1px solid #e2e8f0; flex-shrink: 0; }
  .tab { position: relative; padding: 10px 4px; font-size: 11.5px; font-weight: 500; color: #64748b; border-bottom: 2px solid transparent; }
  .tab:hover { color: #0f172a; }
  .tab--active { color: #2563eb; border-bottom-color: #2563eb; font-weight: 600; }
  .tab-dot { position: absolute; top: 7px; right: 50%; transform: translateX(28px); width: 6px; height: 6px; border-radius: 9999px; background: #dc2626; }
  .tab-dot--warn { background: #ca8a04; }

  /* sections + cards */
  .panel { padding: 12px; }
  .section { margin-bottom: 16px; }
  .section-label { font-size: 10px; font-weight: 700; color: #94a3b8; text-transform: uppercase; letter-spacing: 0.07em; margin-bottom: 6px; }
  .card { border: 1px solid #e2e8f0; background: #fff; border-radius: 6px; padding: 10px 12px; display: flex; flex-direction: column; gap: 8px; }
  .card--accent { border-left: 3px solid #2563eb; }
  .card-title { font-size: 13px; font-weight: 600; color: #0f172a; line-height: 1.3; }
  .accent { color: #2563eb; }
  .prose { font-size: 12px; line-height: 1.5; color: #334155; }
  .prose .lbl { color: #0f172a; }
  .formula { font-family: "JetBrains Mono", monospace; font-size: 11px; color: #475569; background: #f8fafc; border: 1px solid #f1f5f9; padding: 6px 8px; border-radius: 4px; line-height: 1.5; }
  .callout { border-left: 2px solid #cbd5e1; padding: 4px 10px; font-size: 11.5px; color: #475569; line-height: 1.5; background: #f8fafc; border-radius: 0 4px 4px 0; }
  .empty { padding: 16px; border: 1px dashed #e2e8f0; border-radius: 6px; color: #94a3b8; font-size: 12px; line-height: 1.5; text-align: center; }
  .empty-title { color: #475569; font-weight: 600; margin-bottom: 4px; }

  /* kv */
  .kv-grid { display: grid; gap: 6px 14px; grid-template-columns: 1fr 1fr; }
  .kv-grid--3 { grid-template-columns: repeat(3, 1fr); }
  .kv-grid--4 { grid-template-columns: repeat(4, 1fr); }
  .kv-grid--2 { grid-template-columns: repeat(2, 1fr); }
  .kv { display: flex; flex-direction: column; gap: 1px; }
  .kv-l { font-size: 10px; color: #94a3b8; text-transform: uppercase; letter-spacing: 0.05em; }
  .kv-v { font-size: 12.5px; color: #0f172a; font-weight: 500; }

  /* event card */
  .event-card { border-radius: 6px; padding: 10px 12px; display: flex; flex-direction: column; gap: 6px; border: 1px solid; margin-bottom: 6px; }
  .event-card--info     { background: #fff; border-color: #e2e8f0; }
  .event-card--warn     { background: #fefce8; border-color: rgba(202,138,4,.35); }
  .event-card--critical { background: #fef2f2; border-color: rgba(220,38,38,.35); }
  .event-card-head { display: flex; justify-content: space-between; align-items: baseline; gap: 8px; }
  .event-day { font-family: "JetBrains Mono", monospace; font-size: 11px; color: #94a3b8; font-weight: 600; }
  .provenance-row { font-size: 10.5px; color: #64748b; display: flex; flex-wrap: wrap; gap: 4px; align-items: center; padding-top: 4px; border-top: 1px dashed #e2e8f0; }
  .vis-badge { padding: 1px 6px; border-radius: 3px; font-weight: 600; font-size: 10px; text-transform: uppercase; letter-spacing: 0.04em; }
  .vis-low { background: rgba(220,38,38,.12); color: #991b1b; }
  .vis-medium { background: rgba(202,138,4,.14); color: #854d0e; }
  .vis-high { background: rgba(22,163,74,.12); color: #166534; }
  .src-mono { font-family: "JetBrains Mono", monospace; font-size: 10px; color: #94a3b8; }

  /* upcoming */
  .upcoming-list { display: flex; flex-direction: column; gap: 4px; }
  .upcoming-row { display: flex; gap: 10px; padding: 6px 0; border-top: 1px dashed #e2e8f0; }
  .upcoming-row:first-child { border-top: 0; }
  .upcoming-day { font-family: "JetBrains Mono", monospace; font-size: 11px; font-weight: 600; color: #94a3b8; min-width: 28px; }
  .upcoming-type { font-size: 11.5px; font-weight: 600; color: #0f172a; }
  .upcoming-desc { font-size: 11.5px; color: #64748b; line-height: 1.45; }

  /* tables */
  .data-table { width: 100%; border-collapse: collapse; font-size: 11.5px; }
  .data-table thead th { text-align: left; font-weight: 600; color: #94a3b8; padding: 6px 8px 4px; border-bottom: 1px solid #e2e8f0; font-size: 10px; text-transform: uppercase; letter-spacing: 0.04em; }
  .data-table tbody td { padding: 5px 8px; border-bottom: 1px solid #f1f5f9; vertical-align: top; }
  .data-table tbody tr:last-child td { border-bottom: 0; }
  .data-table .row-strong { font-weight: 600; color: #0f172a; }
  .row-total td { font-weight: 700 !important; border-top: 1px solid #cbd5e1 !important; padding-top: 6px !important; }

  /* anchor list */
  .anchor-list { display: flex; flex-direction: column; gap: 0; border: 1px solid #e2e8f0; border-radius: 6px; overflow: hidden; background: #fff; }
  .anchor-row { display: flex; gap: 10px; padding: 8px 12px; border-bottom: 1px solid #f1f5f9; }
  .anchor-row:last-child { border-bottom: 0; }
  .anchor-row--current { background: #eff6ff; box-shadow: inset 2px 0 0 #2563eb; }
  .anchor-day { font-family: "JetBrains Mono", monospace; font-weight: 700; font-size: 11.5px; color: #475569; min-width: 28px; }
  .anchor-body { flex: 1; min-width: 0; display: flex; flex-direction: column; gap: 4px; }
  .anchor-stats { display: flex; flex-wrap: wrap; gap: 8px; align-items: center; }
  .dts-tag { font-family: "JetBrains Mono", monospace; font-size: 10.5px; padding: 1px 6px; border-radius: 3px; background: #f1f5f9; color: #475569; font-weight: 500; }

  /* COA */
  .coa-compare { width: 100%; border-collapse: collapse; font-size: 11.5px; }
  .coa-compare thead th { text-align: left; font-size: 9.5px; text-transform: uppercase; letter-spacing: 0.05em; color: #94a3b8; padding: 4px 6px; border-bottom: 1px solid #e2e8f0; }
  .coa-compare tbody td { padding: 6px; border-bottom: 1px solid #f1f5f9; }
  .row-best td { background: linear-gradient(90deg, rgba(22,163,74,.08), rgba(22,163,74,0)); }
  .p-bar { display: inline-block; width: 40px; height: 4px; background: #f1f5f9; border-radius: 2px; vertical-align: middle; margin-right: 4px; overflow: hidden; }
  .p-bar > span { display: block; height: 100%; background: #2563eb; }
  .coa-card { border: 1px solid #e2e8f0; border-radius: 6px; padding: 12px 14px; background: #fff; display: flex; flex-direction: column; gap: 8px; }
  .coa-head { display: flex; justify-content: space-between; align-items: flex-start; gap: 8px; }
  .recommend-tag { font-size: 10px; font-weight: 700; color: #166534; background: #f0fdf4; border: 1px solid rgba(22,163,74,.3); padding: 2px 7px; border-radius: 9999px; flex-shrink: 0; text-transform: uppercase; letter-spacing: 0.04em; }
  .coa-actions { display: flex; gap: 6px; padding-top: 4px; }
  .btn { padding: 5px 10px; border-radius: 4px; font-size: 11.5px; font-weight: 500; border: 1px solid transparent; line-height: 1.2; }
  .btn-primary { background: #2563eb; color: #fff; }
  .btn-primary:hover { background: #1d4ed8; }
  .btn-ghost   { background: #fff; color: #475569; border-color: #e2e8f0; }
  .btn-ghost:hover { background: #f8fafc; }

  /* routes */
  .route-list { display: flex; flex-direction: column; gap: 8px; }
  .route-card { border: 1px solid #e2e8f0; border-radius: 6px; padding: 10px 12px; background: #fff; display: flex; flex-direction: column; gap: 8px; }
  .route-head { display: flex; justify-content: space-between; align-items: flex-start; gap: 8px; }

  /* fleet */
  .dl-list { display: flex; flex-direction: column; gap: 6px; }
  .dl-row { display: flex; gap: 10px; padding: 8px 10px; border: 1px solid rgba(220,38,38,.25); background: #fef2f2; border-radius: 5px; }
  .dl-day { font-family: "JetBrains Mono", monospace; font-weight: 700; font-size: 11.5px; color: #991b1b; }

  /* dock */
  .dock {
    display: grid; grid-template-columns: auto 1fr auto; gap: 16px;
    background: #fff; border-top: 1px solid #e2e8f0; padding: 10px 16px 12px;
    align-items: center;
  }
  .dock-l, .dock-r { display: flex; align-items: center; gap: 6px; }
  .step-btn { padding: 4px 10px; border-radius: 4px; border: 1px solid #e2e8f0; background: #fff; font-size: 11.5px; color: #475569; }
  .step-btn:hover { background: #f8fafc; color: #0f172a; }
  .dock-day { font-size: 11.5px; color: #475569; margin-left: 6px; }
  .dock-day-n { font-family: "JetBrains Mono", monospace; font-weight: 700; color: #0f172a; }
  .dock-track-wrap { display: flex; flex-direction: column; gap: 5px; }
  .dock-track-rail { position: relative; height: 28px; }
  .dock-track-rail::before { content: ""; position: absolute; left: 0; right: 0; top: 18px; height: 4px; background: #e2e8f0; border-radius: 9999px; }
  .dock-track-fill { position: absolute; left: 0; top: 18px; height: 4px; background: #2563eb; border-radius: 9999px; pointer-events: none; }
  .dock-track-thumb { position: absolute; top: 12px; width: 16px; height: 16px; transform: translateX(-50%); background: #fff; border: 2px solid #2563eb; border-radius: 9999px; box-shadow: 0 1px 2px rgba(15,23,42,.12); pointer-events: none; }
  .dock-range { position: absolute; left: 0; right: 0; top: 12px; width: 100%; height: 16px; opacity: 0; cursor: pointer; }
  .anchor-tick { position: absolute; top: 14px; height: 12px; width: 1px; background: #cbd5e1; transform: translateX(-50%); }
  .event-tick { position: absolute; top: 0; transform: translateX(-50%); pointer-events: none; }
  .event-tick-pin { width: 1.5px; height: 22px; margin: 0 auto; }
  .event-tick--info     .event-tick-pin { background: #475569; }
  .event-tick--warn     .event-tick-pin { background: #ca8a04; }
  .event-tick--critical .event-tick-pin { background: #dc2626; }
  .event-tick-label { font-family: "JetBrains Mono", monospace; font-size: 9.5px; color: #64748b; text-align: center; margin-top: 1px; }
  .dock-axis { display: flex; justify-content: space-between; font-family: "JetBrains Mono", monospace; font-size: 9.5px; color: #94a3b8; padding: 0 2px; }

</style>
</head>
<body>
<div id="root"></div>
