  # ============================================================
  # FAMILY: imagery (Sentinel-2, Landsat — for snow/closure modeling)
  # ============================================================

  - source_id: sentinel2_zoji_la
    source_name: Sentinel-2 L2A — Zoji La (34.28°N, 75.47°E) 5yr backfill
    family: imagery
    tier: primary
    url_or_endpoint: https://catalogue.dataspace.copernicus.eu/odata/v1/
    extractor_module: html
    extractor_config:
      mode: copernicus_odata
      point: [75.47, 34.28]
      buffer_km: 5
      time_range: [2020-01-01, today]
      bands: [B03, B11]
      cloud_cover_max: 60
      derived: NDSI
    raw_table: raw.s2_snow_passes
    pull_frequency: weekly
    license_or_terms: gov_open
    robots_txt_status: respected
    notes: Just outside western AOI but the chokepoint for Kashmir→Ladakh resupply. Critical.

