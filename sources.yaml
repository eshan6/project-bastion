    extractor_module: html
    extractor_config:
      mode: tile_download
      bbox_aoi: true
    raw_table: raw.elevation_aster
    pull_frequency: once
    license_or_terms: gov_open
    robots_txt_status: respected
    notes: Used to cross-check SRTM voids in the Karakoram. Manual portal — may need session cookie.

