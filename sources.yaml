# Project Bastion — Source Catalogue
# Block A, Wk6 seed. Source of truth for the bulk-pull driver.
#
# AOI: Eastern Ladakh, roughly 32.5–35.5°N, 76–79.5°E (XIV Corps area).
# ORBAT scope: XIV Corps + 3 Inf Div + 8 Mtn Div + subordinate/attached units.
#
# Schema (per row):
#   source_id               unique short slug, foreign-keyed from raw.* via provenance_id
#   source_name             human-readable
#   family                  geo_infra | weather | news | orbat | scales_budget | vehicles | tempo | imagery
#   tier                    primary | secondary | deferred
#   url_or_endpoint         base URL or template (use {year}, {month}, {q} for paginated)
#   extractor_module        which file in the repo handles this
#   extractor_config        per-source params (selectors, date ranges, AOI bbox, etc.)
#   raw_table               destination table in raw schema
#   pull_frequency          once | daily | weekly
#   license_or_terms        gov_open | cc_by_sa | cc_by | public_domain | proprietary_public_web
#   robots_txt_status       respected | ignored | n_a
#   notes                   quirks, known issues, deferral reasons
#
# Convention: "ignored" robots is logged honestly so provenance is auditable.
# Operational mitigation (rate limit, UA rotation, checkpointing) is in the
# extractor_base, not in this catalogue.

aoi:
  name: eastern_ladakh_xiv_corps
  bbox: [76.0, 32.5, 79.5, 35.5]   # [west, south, east, north]
  crs: EPSG:4326

sources:

  # ============================================================
  # FAMILY: geo_infra (terrain, transport, infrastructure)
  # ============================================================

  - source_id: bhuvan_wms_terrain
    source_name: Bhuvan WMS — terrain & admin layers, Eastern Ladakh
    family: geo_infra
    tier: primary
    url_or_endpoint: https://bhuvan-vec1.nrsc.gov.in/bhuvan/wms
    extractor_module: html
    extractor_config:
      mode: wms_getmap
      layers: [lulc:lulc_50k, admin:district_2011]
      bbox_aoi: true
    raw_table: raw.bhuvan_layers
    pull_frequency: once
    license_or_terms: gov_open
    robots_txt_status: respected
    notes: NRSC Bhuvan. Endpoints occasionally rotate; verify before pull.

  - source_id: bhuvan_wfs_features
    source_name: Bhuvan WFS — vector features, AOI
    family: geo_infra
    tier: primary
    url_or_endpoint: https://bhuvan-vec1.nrsc.gov.in/bhuvan/wfs
    extractor_module: html
    extractor_config:
      mode: wfs_getfeature
      type_names: [transport:roads, settlements:villages]
      bbox_aoi: true
    raw_table: raw.bhuvan_features
    pull_frequency: once
    license_or_terms: gov_open
    robots_txt_status: respected

  - source_id: osm_geofabrik_india
    source_name: OSM Geofabrik India extract (full PBF, filtered to AOI)
    family: geo_infra
    tier: primary
    url_or_endpoint: https://download.geofabrik.de/asia/india-latest.osm.pbf
    extractor_module: html
    extractor_config:
      mode: bulk_download
      filter_to_aoi: true
      load_layers: [highway, railway, military, place, natural=peak, mountain_pass]
    raw_table: raw.osm_features
    pull_frequency: weekly
    license_or_terms: cc_by_sa
    robots_txt_status: respected
    notes: Single PBF >1GB; filter to AOI before loading PostGIS.

  - source_id: srtm_1arcsec_aoi
    source_name: SRTM 1-arc-second DEM tiles, AOI
    family: geo_infra
    tier: primary
    url_or_endpoint: https://e4ftl01.cr.usgs.gov/MEASURES/SRTMGL1.003/
    extractor_module: html
    extractor_config:
      mode: tile_download
      tiles: [N32E076, N32E077, N32E078, N32E079, N33E076, N33E077, N33E078, N33E079, N34E076, N34E077, N34E078, N34E079, N35E076, N35E077, N35E078, N35E079]
    raw_table: raw.elevation_srtm
    pull_frequency: once
    license_or_terms: public_domain
    robots_txt_status: respected
    notes: Earthdata login required. ~30m resolution. Sufficient for pass-altitude features.

  - source_id: aster_gdem_aoi
    source_name: ASTER GDEM v3 — AOI (high-altitude correction)
    family: geo_infra
